<script>
    // Micro-interaction: Tilt effect on stickers
    document.querySelectorAll('.sticker-slot').forEach(sticker => {
        sticker.addEventListener('mousemove', e => {
            if (!sticker.classList.contains('border-dashed')) {
                const rect = sticker.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = (y - centerY) / 8;
                const rotateY = (centerX - x) / 8;
                sticker.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
            }
        });
        
        sticker.addEventListener('mouseleave', () => {
            sticker.style.transform = '';
        });
    });
</script>
